name: Website online stellen (GitHub Pages)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Code holen
        uses: actions/checkout@v4

      - name: Pages einrichten (aktiviert Pages automatisch)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Website hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
